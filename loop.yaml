- name : looping through a list
  hosts: webservers
  vars:
    list_of_courses:
      - "Ansible"
      - "Terraform"
      - "Python"
  tasks:
    - name: Print each course
      debug:
        msg: "I am taking the {{ item }} course."
      loop: "{{ list_of_courses }}"

    - name : installing packages
      become: yes
      package:
        name: "{{ item.name }}"
        state: "{{ item.state }}"
      loop:
        - {"name": "git", "state": "present"}
        - {"name": "curl", "state": "absent"}
        - {"name": "vim", "state": "present"}